[pytest]
# Pytest configuration for Self-Trained AI System

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    property: Property-based tests
    slow: Slow running tests
    asyncio: Async tests
    training: Model training tests
    recommendation: Recommendation generation tests
    feedback: Feedback collection tests
    performance: Performance tests
    security: Security tests

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    setup.py
    venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
